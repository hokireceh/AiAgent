kind = "web"
previewPath = "/cloud-ide/"
title = "Cloud IDE"
version = "1.0.0"
id = "artifacts/cloud-ide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/cloud-ide/" ]
localPort = 21471

[services.development]
run = "pnpm --filter @workspace/cloud-ide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cloud-ide", "run", "build" ]
publicDir = "artifacts/cloud-ide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21471"
BASE_PATH = "/cloud-ide/"
